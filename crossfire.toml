# ============================================================================
# Crossfire Configuration
# ============================================================================
#
# Model selection philosophy:
#
#   Models are listed in interleaved quality/budget order:
#     1st = best quality, 2nd = cheapest, 3rd = second best, 4th = second cheapest
#   This way --num-generators 2 picks the best + cheapest (good diversity),
#   and --num-generators 4 scales up without being all-cheap or all-expensive.
#
#   Per-mode [modes.*] sections override the global [models.*] defaults.
#   Only roles that differ from the global need to be specified.
#
#   Run 'crossfire prices' to fetch current rates into pricing.json.
# ============================================================================

[openrouter]
api_key_env = "OPENROUTER_API_KEY"

# ---------------------------------------------------------------------------
# Global defaults (fallback when a mode doesn't override a role)
# ---------------------------------------------------------------------------

[models.generators]
names = [
    "openrouter:anthropic/claude-sonnet-4",          # strong all-rounder
    "openrouter:deepseek/deepseek-v3.2",             # near-GPT-5 quality, but dirt cheap
    "openrouter:openai/gpt-4.1",                     # solid yet cheap
    "openrouter:meta-llama/llama-4-maverick",        # cheapest, good for diversity
    "openrouter:mistralai/devstral-2512",            # agentic code specialist
]
context_window = 200000
max_output_tokens = 12000

[models.generators.context_windows]
"openrouter:deepseek/deepseek-v3.2"       = 64000
"openrouter:meta-llama/llama-4-maverick"  = 1000000
"openrouter:mistralai/devstral-2512"      = 262000

[models.reviewers]
# Reviewers are where the adversarial value lives. 
# Reasoning models and blunt critics matter more than raw generation power.
# 15 models supports up to 5 generators * 3 reviewers per candidate.
names = [
    "openrouter:openai/o4-mini",                     # critical reasoning
    "openrouter:google/gemini-3.1-flash-lite",       # fast, 1M context
    "openrouter:mistralai/mistral-medium-3",         # cheap generalist
    "openrouter:x-ai/grok-3-mini",                   # concise, opinionated
    "openrouter:qwen/qwen-plus-2025-07-28",          # hybrid reasoning
    "openrouter:openai/gpt-4.1-mini",                # cheap, fast, competent
    "openrouter:anthropic/claude-haiku-4.5",         # fast critic
    "openrouter:google/gemini-2.5-flash",            # 1M context, reasoning
    "openrouter:deepseek/deepseek-v3.2",             # blunt yet detail-oriented
    "openrouter:mistralai/devstral-2512",            # code-aware perspective
    "openrouter:google/gemini-2.5-pro-preview-03-25", # verbose but thorough
    "openrouter:perplexity/sonar-reasoning-pro",     # reasoning + search
    "openrouter:meta-llama/llama-4-maverick",        # cheapest structure checker
    "openrouter:openai/gpt-4.1",                     # solid generalist
    "openrouter:anthropic/claude-sonnet-4",          # thorough but expensive
]
context_window = 128000
max_output_tokens = 8000

[models.reviewers.context_windows]
"openrouter:deepseek/deepseek-v3.2"                = 64000
"openrouter:google/gemini-3.1-flash-lite"          = 1000000
"openrouter:google/gemini-2.5-flash"               = 1000000
"openrouter:google/gemini-2.5-pro-preview-03-25"   = 1000000
"openrouter:qwen/qwen-plus-2025-07-28"             = 1000000
"openrouter:meta-llama/llama-4-maverick"           = 1000000
"openrouter:mistralai/devstral-2512"               = 262000
"openrouter:anthropic/claude-haiku-4.5"            = 200000
"openrouter:anthropic/claude-sonnet-4"             = 200000
"openrouter:openai/o4-mini"                        = 200000
"openrouter:openai/gpt-4.1"                        = 200000

[models.reviewers.max_output_tokens_by_model]
"openrouter:deepseek/deepseek-v3.2" = 6000

[models.enricher]
names = ["openrouter:openai/gpt-4.1-mini"]           # cheap, fast, good at expansion
context_window = 128000
max_output_tokens = 4096

[models.synthesizer]
names = [
    "openrouter:anthropic/claude-opus-4",            # best multi-doc reasoning
    "openrouter:openai/gpt-5",                       # strong reasoning, 400K context
]
context_window = 200000
max_output_tokens = 32000

[models.synthesizer.context_windows]
"openrouter:openai/gpt-5" = 400000

[models.synthesizer.max_output_tokens_by_model]
"openrouter:openai/gpt-5" = 128000

[search]
enabled = true
provider = "tavily"

[limits]
max_concurrent_requests = 10
temperature_default = 0.2

# ============================================================================
# Mode-specific overrides
# ============================================================================

# --- Research -----------------------------------------------------------------
# Perplexity provides grounded search with real citations. 
# Multiple search-capable generators give diverse sourcing. 
# Reviewers must not overlap with generators!
[modes.research.generators]
names = [
    "openrouter:perplexity/sonar-pro",               # grounded search, real citations
    "openrouter:deepseek/deepseek-v3.2",             # cheap analytical angle
    "openrouter:anthropic/claude-sonnet-4",          # structured analysis
    "openrouter:openai/gpt-4.1",                     # solid researcher
    "openrouter:perplexity/sonar-deep-research",     # multi-step deep research
]
context_window = 200000
max_output_tokens = 12000

[modes.research.generators.context_windows]
"openrouter:perplexity/sonar-pro"           = 200000
"openrouter:perplexity/sonar-deep-research" = 128000
"openrouter:deepseek/deepseek-v3.2"         = 64000

[modes.research.reviewers]
# 15 reviewers: supports up to 5 generators * 3 reviewers per candidate.
# None overlap with the research generators above.
names = [
    "openrouter:openai/o4-mini",                     # reasoning claim checker
    "openrouter:google/gemini-3.1-flash-lite",       # fast, cheap
    "openrouter:mistralai/mistral-medium-3",         # generalist
    "openrouter:x-ai/grok-3-mini",                   # concise critic
    "openrouter:qwen/qwen-plus-2025-07-28",          # hybrid reasoner
    "openrouter:openai/gpt-4.1-mini",                # cheap, fast
    "openrouter:anthropic/claude-haiku-4.5",         # fast Anthropic critic
    "openrouter:google/gemini-2.5-flash",            # reasoning flash
    "openrouter:mistralai/devstral-2512",            # different perspective
    "openrouter:google/gemini-2.5-pro-preview-03-25", # verbose but thorough
    "openrouter:perplexity/sonar-reasoning-pro",     # reasoning + search
    "openrouter:meta-llama/llama-4-maverick",        # cheapest
    "openrouter:openai/gpt-4o-mini",                 # tiny, fast
    "openrouter:deepseek/deepseek-r1",               # reasoning specialist
    "openrouter:google/gemma-3-27b-it",              # zero-cost filler
]
context_window = 128000
max_output_tokens = 8000

# Synthesizer: inherits global (Opus + GPT-5 rotating) — research needs the best

