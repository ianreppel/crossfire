# Reviewers must not overlap with generators!
[modes.research.generators]
names = [
    "openrouter:perplexity/sonar-pro",               # $3/$15     — grounded search, real citations
    "openrouter:deepseek/deepseek-v3.2",             # $0.26/$0.38 — cheap analytical angle
